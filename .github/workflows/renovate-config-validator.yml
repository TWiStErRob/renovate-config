name: "Validate Renovate Config"

on:
  workflow_call:

jobs:

  json5:
    strategy:
      fail-fast: false
      matrix:
        include:

          - name: "Own Config"
            config-file: .github/renovate.json5

          - name: "Shared Config (Actual)"
            config-file: default.json5

          - name: "Group Presets"
            config-file: group.json5

          - name: "Replacements"
            config-file: replacement.json5

    name: "${{ matrix.name }} (JSON5)"
    timeout-minutes: 2
    permissions:
      # actions/checkout
      contents: read
    runs-on: ubuntu-24.04
    steps:

      - name: "Cache NPX."
        uses: actions/cache@v5
        with:
          key: npx-${{ github.workflow }}-${{ github.job }}
          path: |
            ~/.npm/_npx

      - name: "Checkout ${{ github.ref }} branch in ${{ github.repository }} repository."
        uses: actions/checkout@v6

      - name: "Run json5 validator on ${{ env.FILE }}."
        env:
          FILE: ${{ matrix.config-file }}
        shell: bash
        run: >
          npx
          --yes
          json5
          --validate
          "${FILE}"


  config:
    strategy:
      fail-fast: false
      matrix:
        include:

          - name: "Own Config"
            config-file: .github/renovate.json5

          - name: "Shared Config"
            config-file: default.json

          - name: "Shared Config (Actual)"
            config-file: default.json5

          # Not possible yet: "Configuration Error: Invalid configuration option: all".
          #- name: "Group Presets"
          #  config-file: group.json5

    name: "${{ matrix.name }} (Renovate)"
    timeout-minutes: 2
    permissions:
      # actions/checkout
      contents: read
    runs-on: ubuntu-24.04
    steps:

      - name: "Checkout ${{ github.ref }} branch in ${{ github.repository }} repository."
        uses: actions/checkout@v6

      - name: "Set up Node."
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: "Cache NPX."
        uses: actions/cache@v5
        with:
          key: npx-${{ github.workflow }}-${{ github.job }}-${{ hashFiles('package.json') }}
          path: |
            ~/.npm/_npx

      - name: "Run renovate-config-validator on ${{ env.FILE }}."
        env:
          FILE: ${{ matrix.config-file }}
        shell: bash
        run: |
          renovateVersion="$(node -p "require('./package.json').devDependencies.renovate")"
          npx \
            --yes \
            --package "renovate@${renovateVersion}" \
            -- \
            renovate-config-validator \
            --strict \
            "${FILE}"
